name: CMake multi platform

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git reference to build (branch, tag, or commit SHA)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: gcc
            cpp_compiler: g++

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install deps (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Set compilers
        run: |
          echo "CC=${{ matrix.c_compiler }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cpp_compiler }}" >> $GITHUB_ENV

      - name: Build (library only)
        run: make build BUILD_TYPE=${{ matrix.build_type }}

      - name: Build + run tests (Release, no coverage)
        if: matrix.build_type == 'Release'
        run: |
          make build TESTS=1 BUILD_TYPE=Release
          make test

      - name: Build + run tests (Debug with coverage)
        if: matrix.build_type == 'Debug'
        run: make coverage

      - name: Build csound plugin
        run: make build CSOUND=1 BUILD_TYPE=${{ matrix.build_type }}

      - name: Build utils
        run: make build UTILS=1 BUILD_TYPE=${{ matrix.build_type }}
